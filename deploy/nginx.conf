server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;
    add_header Referrer-Policy "unsafe-url" always;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_PROXY_URL。
    location /api-proxy/v1beta/models/ {
        limit_except POST OPTIONS {
            deny all;
        }

        proxy_pass https://vip.aittco.com/v1beta/models/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name vip.aittco.com;
        proxy_set_header Host vip.aittco.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api-proxy/v1/dashboard/billing/ {
        limit_except GET OPTIONS {
            deny all;
        }

        proxy_pass ${API_PROXY_URL}/dashboard/billing/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api-proxy/dashboard/billing/ {
        limit_except GET OPTIONS {
            deny all;
        }

        proxy_pass ${API_PROXY_URL}/dashboard/billing/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ~ ^/api-proxy/v1/(images/generations|images/edits|responses)$ {
        limit_except POST OPTIONS {
            deny all;
        }

        rewrite ^/api-proxy/v1/(.*)$ /v1/$1 break;
        proxy_pass ${API_PROXY_LEGACY_V1_BASE_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /api-proxy/ {
        limit_except POST OPTIONS {
            deny all;
        }

        set $allow_proxy 0;
        if ($uri ~* ^/api-proxy/((v1/)?(images/generations|images/edits|responses))$) {
            set $allow_proxy 1;
        }
        if ($allow_proxy = 0) {
            return 403 "Forbidden: API Proxy path restricted";
        }

        proxy_pass ${API_PROXY_URL}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    # END API PROXY

    location /download-proxy {
        limit_except GET {
            deny all;
        }

        set $download_target "";
        if ($arg_url ~* "^https://file1\.aitohumanize\.com/(.*)$") {
            set $download_target https://file1.aitohumanize.com/$1;
        }
        if ($arg_url ~* "^https://visionary\.beer/(.*)$") {
            set $download_target https://visionary.beer/$1;
        }
        if ($download_target = "") {
            return 403 "Forbidden: download proxy host restricted";
        }

        proxy_pass $download_target;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Content-Disposition;
        add_header Content-Disposition "attachment" always;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
