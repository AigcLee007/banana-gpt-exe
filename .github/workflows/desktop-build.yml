name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - fix/ui-polish-gemini-settings-theme

permissions:
  contents: read

jobs:
  build:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: desktop-windows
            build_script: desktop:dist:win
          - os: macos-latest
            platform: mac
            artifact_name: desktop-macos
            build_script: desktop:dist:mac

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build web app
        run: npm run build

      - name: Build desktop package
        run: npm run ${{ matrix.build_script }} -- --publish never

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/**
          if-no-files-found: error
          retention-days: 14
